name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels: [bug]
body:
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: macOS 26.3
    validations:
      required: true
  - type: input
    id: hardware
    attributes:
      label: Mac model / chip
      placeholder: MacBook Pro, M4
    validations:
      required: true
  - type: input
    id: app
    attributes:
      label: Frontmost application
      placeholder: Safari 26.0
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recording
