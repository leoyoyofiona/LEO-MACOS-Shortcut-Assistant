name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build and package
        run: |
          chmod +x build-app.sh scripts/package-release.sh
          scripts/package-release.sh "${GITHUB_REF_NAME#v}"
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release/*.zip release/*.dmg release/SHA256SUMS.txt \
            --generate-notes \
            --title "LEO-MACOS Shortcut Assistant $GITHUB_REF_NAME"
