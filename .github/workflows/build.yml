name: Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build release app
        run: |
          chmod +x build-app.sh
          ./build-app.sh
      - name: Package artifact
        run: ditto -c -k --sequesterRsrc --keepParent "dist/LEO-MACOS快捷键助手.app" LEO-MACOS-Shortcut-Assistant.zip
      - uses: actions/upload-artifact@v4
        with:
          name: LEO-MACOS-Shortcut-Assistant
          path: LEO-MACOS-Shortcut-Assistant.zip
