<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="820" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">LEO-MACOS Shortcut Assistant first-launch guide</title>
  <desc id="desc">Four illustrated steps covering download, installation, Open Anyway, and permissions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#edf5ff"/><stop offset="1" stop-color="#f7f2ff"/></linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#087cff"/><stop offset="1" stop-color="#7657ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#14213d" flood-opacity=".12"/></filter>
    <style>
      .title{font:700 34px -apple-system,BlinkMacSystemFont,sans-serif;fill:#172033}.sub{font:400 18px -apple-system,BlinkMacSystemFont,sans-serif;fill:#5d687c}.cardTitle{font:700 23px -apple-system,BlinkMacSystemFont,sans-serif;fill:#172033}.body{font:500 17px -apple-system,BlinkMacSystemFont,sans-serif;fill:#47536a}.tiny{font:500 14px -apple-system,BlinkMacSystemFont,sans-serif;fill:#667085}.step{font:700 20px -apple-system,BlinkMacSystemFont,sans-serif;fill:white}.ui{font:600 16px -apple-system,BlinkMacSystemFont,sans-serif;fill:#253047}.button{font:700 15px -apple-system,BlinkMacSystemFont,sans-serif;fill:white}
    </style>
  </defs>
  <rect width="1200" height="820" rx="36" fill="url(#bg)"/>
  <text x="600" y="64" text-anchor="middle" class="title">Install and approve the first launch</text>
  <text x="600" y="96" text-anchor="middle" class="sub">Keep Gatekeeper enabled — approve this app once</text>
  <g transform="translate(55 135)" filter="url(#shadow)"><rect width="520" height="285" rx="25" fill="white"/><circle cx="42" cy="42" r="23" fill="url(#accent)"/><text x="42" y="49" text-anchor="middle" class="step">1</text><text x="82" y="49" class="cardTitle">Download and install</text><rect x="34" y="76" width="452" height="152" rx="15" fill="#f5f7fb" stroke="#dfe4ec"/><circle cx="60" cy="98" r="5" fill="#ff5f57"/><circle cx="78" cy="98" r="5" fill="#febc2e"/><circle cx="96" cy="98" r="5" fill="#28c840"/><rect x="54" y="122" width="176" height="74" rx="13" fill="#e8f2ff" stroke="#90bfff"/><text x="142" y="151" text-anchor="middle" class="ui">GitHub Releases</text><text x="142" y="177" text-anchor="middle" class="tiny">Download the .dmg</text><path d="M244 158h52" stroke="#75839b" stroke-width="3" stroke-linecap="round"/><path d="m286 148 12 10-12 10" fill="none" stroke="#75839b" stroke-width="3"/><rect x="312" y="122" width="154" height="74" rx="13" fill="#fff" stroke="#cfd5df"/><text x="389" y="151" text-anchor="middle" class="ui">Applications</text><text x="389" y="177" text-anchor="middle" class="tiny">Drag the app here</text><text x="34" y="260" class="body">Open the DMG and drag the app to Applications</text></g>
  <g transform="translate(625 135)" filter="url(#shadow)"><rect width="520" height="285" rx="25" fill="white"/><circle cx="42" cy="42" r="23" fill="url(#accent)"/><text x="42" y="49" text-anchor="middle" class="step">2</text><text x="82" y="49" class="cardTitle">Try opening it once</text><rect x="48" y="80" width="424" height="145" rx="18" fill="#f7f7f8" stroke="#d6d8de"/><circle cx="103" cy="137" r="25" fill="#ffb020"/><path d="M103 119v24m0 12v1" stroke="white" stroke-width="5" stroke-linecap="round"/><text x="145" y="118" class="ui">Developer cannot be verified</text><text x="145" y="147" class="tiny">Expected for this unnotarized preview</text><rect x="341" y="174" width="102" height="32" rx="8" fill="#e3e5e9"/><text x="392" y="195" text-anchor="middle" class="ui">Done</text><text x="34" y="260" class="body">Dismiss the warning; do not delete the app</text></g>
  <g transform="translate(55 465)" filter="url(#shadow)"><rect width="520" height="285" rx="25" fill="white"/><circle cx="42" cy="42" r="23" fill="url(#accent)"/><text x="42" y="49" text-anchor="middle" class="step">3</text><text x="82" y="49" class="cardTitle">Approve this one launch</text><rect x="34" y="76" width="452" height="154" rx="16" fill="#f5f7fb" stroke="#dfe4ec"/><text x="55" y="108" class="ui">System Settings  ›  Privacy &amp; Security</text><line x1="55" y1="124" x2="465" y2="124" stroke="#d8dde6"/><text x="55" y="154" class="tiny">The app was blocked from use</text><rect x="327" y="172" width="138" height="38" rx="10" fill="url(#accent)"/><text x="396" y="197" text-anchor="middle" class="button">Open Anyway</text><text x="34" y="260" class="body">Click Open Anyway, authenticate, then confirm Open</text></g>
  <g transform="translate(625 465)" filter="url(#shadow)"><rect width="520" height="285" rx="25" fill="white"/><circle cx="42" cy="42" r="23" fill="url(#accent)"/><text x="42" y="49" text-anchor="middle" class="step">4</text><text x="82" y="49" class="cardTitle">Grant two required permissions</text><rect x="34" y="76" width="452" height="154" rx="16" fill="#f5f7fb" stroke="#dfe4ec"/><text x="55" y="109" class="ui">System Settings  ›  Privacy &amp; Security</text><text x="55" y="150" class="body">Accessibility</text><rect x="411" y="132" width="54" height="30" rx="15" fill="#087cff"/><circle cx="449" cy="147" r="12" fill="white"/><text x="55" y="199" class="body">Input Monitoring</text><rect x="411" y="181" width="54" height="30" rx="15" fill="#087cff"/><circle cx="449" cy="196" r="12" fill="white"/><text x="34" y="260" class="body">Enable both, then relaunch the app</text></g>
  <text x="600" y="795" text-anchor="middle" class="tiny">Future launches work with a normal double-click</text>
</svg>
